name: Deploy Stock Portal
on:
  push:
    branches: [master]
    paths:
      - 'warden-stock-portal/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy warden-stock-portal to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./warden-stock-portal
          publish_branch: gh-pages
          destination_dir: warden-stock-portal
          keep_files: true
