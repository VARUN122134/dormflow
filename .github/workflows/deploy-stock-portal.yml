name: Deploy Stock Portal
on:
  push:
    branches: [master]
    paths:
      - 'warden-stock-portal/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - run: |
          rm -rf gh-pages/warden-stock-portal
          cp -r warden-stock-portal gh-pages/warden-stock-portal
      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Deploy warden-stock-portal"
          git push origin gh-pages
