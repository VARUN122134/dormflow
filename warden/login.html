<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Warden Portal - Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="api.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      background-image: radial-gradient(at 0% 0%, rgba(173,198,255,0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(78,222,163,0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(255,217,179,0.1) 0px, transparent 50%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass-card {
      backdrop-filter: blur(40px);
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
    }
    .glass-input {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,0,0,0.1);
      border-bottom: 2px solid rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }
    .glass-input:focus {
      border-bottom-color: #005ac2;
      background: #fff;
      outline: none;
      box-shadow: 0 4px 20px -5px rgba(0,90,194,0.15);
    }
  </style>
</head>
<body>
  <div class="w-full max-w-md p-8 glass-card rounded-[32px] mx-4">
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-primary" style="font-size:36px;">admin_panel_settings</span>
      </div>
      <h1 class="text-headline-lg font-black text-on-surface">Warden Portal</h1>
      <p class="text-on-surface-variant/70 text-sm mt-1">Sign in to manage your hostel</p>
    </div>
    <form id="loginForm" class="space-y-6">
      <div>
        <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant block mb-2">Email</label>
        <input type="email" id="email" class="w-full glass-input px-4 py-4 rounded-2xl text-on-surface font-body-lg" placeholder="admin@hostel.edu" required/>
      </div>
      <div>
        <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant block mb-2">Password</label>
        <input type="password" id="password" class="w-full glass-input px-4 py-4 rounded-2xl text-on-surface font-body-lg" placeholder="Enter password" required/>
      </div>
      <div id="loginError" class="hidden text-error text-sm text-center bg-error/5 p-3 rounded-xl"></div>
      <button type="submit" id="loginBtn" class="w-full bg-primary text-on-primary font-bold py-4 rounded-2xl shadow-lg hover:brightness-110 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
        <span class="material-symbols-outlined">login</span>
        Sign In
      </button>
    </form>
    <div class="mt-8 pt-6 border-t border-black/5 text-center">
      <a href="https://varun122134.github.io/UCE-IT/" class="text-sm text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined" style="font-size:14px;">arrow_back</span>
        Back to Student Portal
      </a>
    </div>
  </div>
  <script>
    (function() {
      if (API.isAuthenticated()) {
        window.location.href = "dashboard.html";
        return;
      }
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');

        if (!email || !password) {
          errorDiv.textContent = 'Please fill in all fields';
          errorDiv.classList.remove('hidden');
          return;
        }

        errorDiv.classList.add('hidden');
        btn.disabled = true;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Signing in...';

        try {
          await API.login(email, password);
          window.location.href = "dashboard.html";
        } catch (err) {
          errorDiv.textContent = err.message || 'Login failed';
          errorDiv.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '<span class="material-symbols-outlined">login</span> Sign In';
        }
      });
    })();
  </script>
</body>
</html>
